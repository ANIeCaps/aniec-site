<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Richiesta inviata</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fbff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      color: #1f2a44;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 500px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: white;
      background: #1b2f6b;
      padding: 12px 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Richiesta inviata</h1>
    <p>Grazie per averci contattato. Verrai ricontattato nel più breve tempo possibile.</p>
    <a href="/">Torna al sito</a>
  </div>
</body>
</html>
